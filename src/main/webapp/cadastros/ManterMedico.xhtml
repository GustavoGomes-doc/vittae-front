<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="corpo">

		<h1>Manter Medico</h1>

		<h:form id="frmPesquisa">
			<p:messages id="messages" showDetail="false" closable="true">
				<p:autoUpdate />
			</p:messages>

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:commandButton icon="pi pi-plus" value="Novo" id="botaoNovo"
						oncomplete="PF('editarDialogWidgetVar').show()"
						update="editarDialog" process="@this" />
				</p:toolbarGroup>
			</p:toolbar>


			<p:dataTable id="medicosTable" var="medico"
				value="#{manterMedicoBean.medicos}" lazy="false"
				style="margin-top: 20px" emptyMessage="Nenhum medico encontrado."
				rows="10" paginator="true" paginatorAlwaysVisible="true"
				paginatorPosition="bottom" rowsPerPageTemplate="5,10,15">

				<p:column headerText="Id" style="width: 40px; text-align: center">
					<h:outputText value="#{medico.id}" />
				</p:column>

				<p:column headerText="Nome" style="width: 150px; text-align: left"
					filterBy="#{medico.nome}">
					<h:outputText value="#{medico.nome}" />
				</p:column>

				<p:column headerText="Email" style="width: 150px; text-align: left">
					<h:outputText value="#{medico.email}" />
				</p:column>

				<p:column headerText="Operações"
					style="width: 40px; text-align: center">

					<p:commandButton id="cb1" icon="pi pi-pencil" title="Editar"
						oncomplete="PF('editarDialogWidgetVar').show()"
						update=":frmPesquisa:editarDialog" process="@this">
						<f:setPropertyActionListener target="#{manterMedicoBean.medico}"
							value="#{medico}" />
					</p:commandButton>

					<p:commandButton icon="pi pi-trash" title="Excluir"
						onclick="PF('confirmacaoExclusao').show();" process="@this">
						<f:setPropertyActionListener target="#{manterMedicoBean.medico}"
							value="#{medico}" />
					</p:commandButton>
				</p:column>

			</p:dataTable>

			<p:dialog id="editarDialog" header="Atendimento"
				widgetVar="editarDialogWidgetVar" modal="true" resizable="true"
				closeOnEscape="true" showEffect="explode" hideEffect="explode"
				width="100%" position="center top" maximizable="true" height="70%"
				fitViewport="true" responsive="true">

				<p:panelGrid id="editarGrid" columns="2" style="width: 100%"
					columnClasses="rotulo, campo">

					<p:outputLabel value="Id" for="id" />
					<p:inputText id="id" size="20" maxlength="20"
						value="#{manterMedicoBean.medico.id}" readonly="true" />

					<p:outputLabel value="Nome" for="nome" />
					<h:panelGroup>
						<p:inputText id="nome" size="60" maxlength="80" required="true"
							validatorMessage="O nome é obrigatório."
							value="#{manterMedicoBean.medico.nome}" />
					</h:panelGroup>

					<p:outputLabel value="Email" for="email" />
					<h:panelGroup>
						<p:inputText id="email" size="60" maxlength="80" required="true"
							validatorMessage="O email é obrigatório."
							value="#{manterMedicoBean.medico.email}" />
					</h:panelGroup>

					<h:panelGroup>
						<p:commandButton icon="pi pi-save" id="salvarButton"
							value="Salvar" title="Grava dados do medico"
							actionListener="#{manterMedicoBean.salvar}"
							oncomplete="if (!args.validationFailed) PF('editarDialogWidgetVar').hide()"
							update="medicosTable messages" process="@this editarGrid">
						</p:commandButton>

						<p:spacer width="10px" />

						<p:commandButton icon="pi pi-thumbs-up" value="Sair"
							update="frmPesquisa"
							onclick="PF('editarDialogWidgetVar').hide();" process="@this" />
					</h:panelGroup>

				</p:panelGrid>
			</p:dialog>

			<p:confirmDialog id="confirmacaoExclusaoDialog"
				widgetVar="confirmacaoExclusao"
				message="Tem certeza que deseja excluir o medico #{manterMedicoBean.medico.nome}?"
				header="Exclusão de medico" severity="alert">
				<p:button icon="pi pi-thumbs-down" value="Não"
					onclick="PF('confirmacaoExclusao').hide(); return false;"
					process="@this" />
				<p:commandButton icon="pi pi-thumbs-up" value="Sim"
					update=":frmPesquisa:medicosTable"
					onclick="PF('confirmacaoExclusao').hide();"
					action="#{manterMedicoBean.excluir}" process="@this" />
			</p:confirmDialog>

		</h:form>
	</ui:define>
</ui:composition>
