<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">Cadastro de Médicos</ui:define>

	<ui:define name="corpo">

		<h:form id="formulario">

			<h1>MÉDICOS</h1>

			<p:growl id="growl" showDetail="false" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:commandButton icon="pi pi-plus" value="Novo"
						actionListener="#{manterMedicoBean.limpar}" update="editarDialog"
						oncomplete="PF('editarDialogWidgetVar').show()" process="@this" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:dataTable id="medicosTable" var="medico"
				value="#{manterMedicoBean.medicos}" lazy="false"
				showGridlines="true" style="margin-top: 20px"
				emptyMessage="Nenhum médico encontrado." rows="10" paginator="true"
				paginatorAlwaysVisible="true" paginatorPosition="bottom"
				rowsPerPageTemplate="5,10,15">

				<p:column headerText="Id">
					<h:outputText value="#{medico.id}" />
				</p:column>

				<p:column headerText="Nome" filterBy="#{medico.nome}"
					sortBy="#{medico.nome}">
					<h:outputText value="#{medico.nome}" />
				</p:column>

				<p:column headerText="E-mail" filterBy="#{medico.email}"
					sortBy="#{medico.email}">
					<h:outputText value="#{medico.email}" />
				</p:column>

				<p:column headerText="CRM" filterBy="#{medico.crm}"
					sortBy="#{medico.crm}">
					<h:outputText value="#{medico.crm}" />
				</p:column>

				<p:column headerText="CPF" width="120">
					<h:outputText value="#{medico.cpf}" />
				</p:column>

				<p:column headerText="CEP" width="100">
					<h:outputText value="#{medico.cep}" />
				</p:column>

				<p:column headerText="Valor da Consulta" width="150">
					<h:outputText value="#{medico.valorConsulta}">
						<f:convertNumber type="currency" currencySymbol="R$"
							locale="pt_BR" />
					</h:outputText>
				</p:column>

				<p:column headerText="Operações">

					<p:commandButton id="cb1" icon="pi pi-pencil" title="Editar"
						oncomplete="PF('editarDialogWidgetVar').show()"
						update=":formulario:editarDialog" process="@this">
						<f:setPropertyActionListener target="#{manterMedicoBean.medico}"
							value="#{medico}" />
					</p:commandButton>

					<p:commandButton icon="pi pi-trash" title="Excluir"
						onclick="PF('confirmacaoExclusao').show();" process="@this">
						<f:setPropertyActionListener target="#{manterMedicoBean.medico}"
							value="#{medico}" />
					</p:commandButton>
				</p:column>

			</p:dataTable>

			<p:dialog id="editarDialog" header="Médico"
				widgetVar="editarDialogWidgetVar" modal="true" resizable="true"
				closeOnEscape="true" showEffect="explode" hideEffect="explode"
				width="600" position="center top" maximizable="true"
				responsive="true">

				<p:messages id="msgsDialog" showDetail="false" closable="true" />

				<p:panelGrid id="grid" columns="2" layout="grid"
					styleClass="ui-panelgrid-blank">

					<p:outputLabel for="id" value="Id: " />
					<p:outputLabel id="id" value="#{manterMedicoBean.medico.id}" />

					<p:outputLabel for="nome" value="Nome: " />
					<p:inputText id="nome" value="#{manterMedicoBean.medico.nome}"
						required="true" requiredMessage="O nome é obrigatório." />

					<p:outputLabel for="email" value="E-mail: " />
					<p:inputText id="email" value="#{manterMedicoBean.medico.email}"
						required="true" requiredMessage="O e-mail é obrigatório." />

					<p:outputLabel for="crm" value="CRM:  " />
					<p:inputText id="crm" value="#{manterMedicoBean.medico.crm}" />

					<p:outputLabel for="cpf" value="CPF:" />
					<p:inputMask id="cpf" value="#{manterMedicoBean.medico.cpf}"
						mask="999.999.999-99" autoClear="false" />

					<p:outputLabel for="cep" value="CEP:" />
					<p:inputMask id="cep" value="#{manterMedicoBean.medico.cep}"
						mask="99999-999" autoClear="false" />

					<p:outputLabel for="valorConsulta" value="VALOR CONSULTA:  " />
					<p:inputText id="valorConsulta"
						value="#{manterMedicoBean.medico.valorConsulta}" />

					<f:facet name="footer">
						<p:commandButton icon="pi pi-save" id="salvarButton"
							value="Salvar" title="Grava dados do médico"
							actionListener="#{manterMedicoBean.salvar}"
							oncomplete="if (!args.validationFailed) PF('editarDialogWidgetVar').hide()"
							update="msgsDialog growl medicosTable" process="@this grid"
							style="margin-top: 10px" />
					</f:facet>

				</p:panelGrid>
			</p:dialog>

			<p:confirmDialog id="confirmacaoExclusaoDialog"
				widgetVar="confirmacaoExclusao"
				message="Tem certeza que deseja excluir o médico #{manterMedicoBean.medico.nome}?"
				header="Exclusão de médico" severity="alert">
				<p:button icon="pi pi-thumbs-down" value="Não"
					onclick="PF('confirmacaoExclusao').hide(); return false;"
					process="@this" />
				<p:commandButton icon="pi pi-thumbs-up" value="Sim"
					update=":formulario:medicosTable"
					onclick="PF('confirmacaoExclusao').hide();"
					action="#{manterMedicoBean.excluir}" 
					process="@this" />
			</p:confirmDialog>

		</h:form>
	</ui:define>
</ui:composition>
