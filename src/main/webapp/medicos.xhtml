<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:o="http://omnifaces.org/ui">

    <ui:define name="corpo">
        
        <h2>Médicos Cadastrados</h2>
        
        <h:form id="frmMedicos">
            
            <p:dataTable value="#{manterMedicoBean.medicos}" var="medico" 
                         emptyMessage="Nenhum médico encontrado."
                         paginator="true" rows="10"
                         style="margin-top: 20px;">
                
                <p:column headerText="ID" width="50">
                    <h:outputText value="#{medico.id}" />
                </p:column>

                <p:column headerText="Nome">
                    <h:outputText value="#{medico.nome}" />
                </p:column>

                <p:column headerText="CRM" width="150">
                    <h:outputText value="#{medico.crm}" />
                </p:column>

                <p:column headerText="E-mail">
                    <h:outputText value="#{medico.email}" />
                </p:column>

                <p:column headerText="Valor da Consulta" width="150">
                    <h:outputText value="#{medico.valorConsulta}">
                        <f:convertNumber type="currency" currencySymbol="R$" locale="pt_BR"/>
                    </h:outputText>
                </p:column>

            </p:dataTable>
            
        </h:form>
        
    </ui:define>

</ui:composition>
